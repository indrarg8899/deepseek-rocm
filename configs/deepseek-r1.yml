# DeepSeek-R1 Configuration (reasoning model)
model_path: deepseek-ai/DeepSeek-R1
device: cuda:0
device_map: auto
dtype: bfloat16
load_in_4bit: false
compile_model: true
use_flash_attention: true

# Generation — longer for chain-of-thought
max_new_tokens: 8192
temperature: 0.6
top_p: 0.95
top_k: 50
repetition_penalty: 1.0

# Architecture (same as V3)
hidden_size: 7168
num_layers: 61
num_attention_heads: 128
num_kv_heads: 128
intermediate_size: 18432
num_experts: 256
num_shared_experts: 1
top_k_experts: 8
moe_intermediate_size: 2048
vocab_size: 102400
max_position_embeddings: 163840
rope_theta: 10000.0

# Training (LoRA)
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
use_qlora: true
qlora_bits: 4
learning_rate: 1e-4
epochs: 2
